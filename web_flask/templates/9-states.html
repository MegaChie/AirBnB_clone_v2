<!DOCTYPE html>
<HTML lang="en">
<HEAD>
	<TITLE>HBNB</TITLE>
</HEAD>

<BODY>
	{% if listed %}
	<H1>States</H1>
	<UL>
		{% for i in listed %}
		<LI>{{ i.id }}: <B>{{ i.name }}</B></LI>
		{% endfor %}
	</UL>
	{% elif listed == None %}
	<H1>State: </H1>
	<H3>Cities:</H3>
	<UL>
		<!-- forloob here -->
		<!-- <LI>{{ city.id }}: <B>{{ city.name }}</B></LI> -->
		<!-- forloob end -->
	</UL>
	{% else %}
	<H1>Not found!</H1>
	{% endif %}
</BODY>
</HTML>
