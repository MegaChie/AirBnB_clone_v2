<!DOCTYPE html>
<HTML lang="en">
    <HEAD>
        <TITLE>HBNB</TITLE>
    </HEAD>

    <BODY>
    {% if listed %}
    <H1>States</H1>
    <UL>
        {% for i in listed %}
        <LI>{{ i.id }}: <B>{{ i.name }}</B></LI>
        {% endfor %}
    </UL>
    {% elif statName %}
    <H1>State: {{ statName }}</H1>
    <H3>Cities:</H3>
    <UL>
        {% for j in statctys %}
        <LI>{{ j[0] }}: <B>{{ j[-1] }}</B></LI>
        {% endfor %}
    </UL>
    {% else %}
    <H1>Not found!</H1>
    {% endif %}
    </BODY>
</HTML>
